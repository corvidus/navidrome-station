name: navidrome-station

services:
  station:
    build: .
    image: navidrome-station:latest
    container_name: navidrome-station
    restart: unless-stopped
    # Defence in depth: the service writes nothing to disk and needs no
    # privileges, so lock it down to a read-only root filesystem with no Linux
    # capabilities and no privilege escalation. Together with the distroless
    # :nonroot image, a compromise still cannot write to the host or escalate.
    read_only: true
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    # Hosts sign in with their own Navidrome accounts, so the service needs no
    # credentials of its own — only the URL of your Navidrome instance.
    environment:
      LISTEN_ADDR: ":8080"
      # Point this at your Navidrome. The default assumes Navidrome is reachable
      # as "navidrome:4533" on the shared Docker network defined below.
      ND_URL: "http://navidrome:4533"
      # --- Transcoding -------------------------------------------------------
      # Every stream is transcoded by Navidrome to cap per-listener bandwidth.
      # These two settings are read from the global .env file (copy .env.example
      # to .env to change them in one place); the ":-" values are the defaults
      # used when .env is absent. STREAM_FORMAT must name a transcoding profile
      # that exists in Navidrome.
      #
      # Default: 256 kbps CBR MP3 — plays in every browser, works out of the box.
      STREAM_FORMAT: "${STREAM_FORMAT:-mp3}"
      STREAM_MAX_BITRATE: "${STREAM_MAX_BITRATE:-256}"
      #
      # Other options (set these in .env, or uncomment-and-edit the .env lines).
      # All of these except the custom one ship with Navidrome by default:
      #   VBR, smaller files  -> STREAM_FORMAT=opus  STREAM_MAX_BITRATE=128
      #     Opus is VBR by default; ~128 kbps Opus is transparent. Note: Safari
      #     plays Ogg/Opus unreliably — prefer MP3 or AAC if guests use Safari/iOS.
      #   Safari-friendly      -> STREAM_FORMAT=aac   STREAM_MAX_BITRATE=192
      #     AAC has excellent Safari/iOS support and beats MP3 at low bitrates.
      #   Lossless (no cap)    -> STREAM_FORMAT=flac  STREAM_MAX_BITRATE=0
      #     FLAC is lossless: it does NOT save bandwidth (can exceed the source);
      #     use it to deliver full quality. The bitrate cap is ignored.
      #   VBR MP3 (needs a custom Navidrome profile, e.g. "mp3 vbr" using
      #     `-q:a`) -> STREAM_FORMAT=mp3\ vbr  STREAM_MAX_BITRATE=0
      #   Original files, no transcode -> STREAM_FORMAT=raw  STREAM_MAX_BITRATE=0
    ports:
      # host:container — change the host port to taste, then point a reverse
      # proxy (for TLS) at it. See the README for path-based routing.
      - "8090:8080"
    networks:
      - navidrome

networks:
  # Join the Docker network your Navidrome stack runs on so this service can
  # reach it by name. Set `name:` to that network (Compose names a stack's
  # default network "<project>_default", e.g. "navidrome_default").
  navidrome:
    external: true
    name: navidrome_default
